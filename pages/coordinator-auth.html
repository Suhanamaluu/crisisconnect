<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Coordinator Authentication - Login or Signup to manage crisis response.">
    <title>Coordinator Login | CDRS - Crisis Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/coordinator.css">
</head>

<body>
    <div class="auth-page" id="auth-page">
        <a href="../index.html" class="auth-back" id="auth-back">← Back to Home</a>
        <div class="logo" id="auth-logo">
            <span class="logo-icon">🛡️</span>
            <span class="logo-text" style="color:var(--color-white);">CDRS</span>
        </div>
        <h2 style="color:var(--color-white); margin-bottom:0.5rem; font-size:1.75rem;">Coordinator Portal</h2>
        <p style="color:rgba(255,255,255,0.5); margin-bottom:2.5rem; font-size:0.9rem; text-align:center;">
            Manage camps, respond to requests, and coordinate disaster response
        </p>
        <div class="auth-buttons" id="auth-buttons">
            <button class="auth-btn auth-btn--signup" id="auth-signup-btn">📝 Sign Up</button>
            <button class="auth-btn auth-btn--login" id="auth-login-btn">🔐 Log In</button>
        </div>

        <!-- SMS Simulation -->
        <div class="sms-simulation" id="sms-simulation">
            <div class="sms-header">📱 SMS Notification</div>
            <p>Your Coordinator Code:</p>
            <div class="sms-code" id="sms-code"></div>
            <p class="sms-note">Save this code — you'll need it to log in. This simulates an SMS message sent to your
                phone.</p>
        </div>
    </div>

    <!-- Signup Modal -->
    <div class="modal-overlay" id="signup-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Create Account</h2>
                <button class="modal-close" id="signup-close">×</button>
            </div>
            <form id="signup-form">
                <div class="form-group">
                    <label class="form-label" for="signup-name">Full Name *</label>
                    <input class="form-input" type="text" id="signup-name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="signup-camp-code">Camp Code *</label>
                    <input class="form-input" type="text" id="signup-camp-code" placeholder="e.g., CRC-2026" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="signup-email">Gmail *</label>
                    <input class="form-input" type="email" id="signup-email" placeholder="you@gmail.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="signup-phone">Phone Number *</label>
                    <input class="form-input" type="tel" id="signup-phone" placeholder="+1 234 567 890" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="signup-password">Password *</label>
                    <input class="form-input" type="password" id="signup-password" placeholder="Minimum 4 characters"
                        required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="signup-confirm">Confirm Password *</label>
                    <input class="form-input" type="password" id="signup-confirm" placeholder="Re-enter password"
                        required>
                </div>
                <button type="submit" class="btn btn--primary btn--lg" style="width:100%;">Create Account</button>
            </form>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="login-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Coordinator Login</h2>
                <button class="modal-close" id="login-close">×</button>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="login-code">Coordinator Code *</label>
                    <input class="form-input" type="text" id="login-code" placeholder="6-digit code" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="login-password">Password *</label>
                    <input class="form-input" type="password" id="login-password" placeholder="Your password" required>
                </div>
                <button type="submit" class="btn btn--primary btn--lg" style="width:100%;">🔐 Log In</button>
            </form>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/coordinator.js"></script>
</body>

</html>
